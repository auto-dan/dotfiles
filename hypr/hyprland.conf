########################################################################################
# HYPRLAND CONFIG - OLED & MODERN SYNTAX OPTIMIZED
########################################################################################

# --- Monitors ---
# 4K @ 120Hz - Primary OLED
monitor=DP-1,3840x2160@120,auto,1

xwayland {
    force_zero_scaling = true
}

# --- Programs ---
$terminal = kitty
$fileManager = dolphin
$menu = wofi --show drun --style ~/.config/wofi/theme.css
$mainMod = SUPER

# --- Autostart ---
exec-once = nm-applet
exec-once = swaync
exec-once = hypridle
exec-once = waybar

# --- Env Variables ---
env = GTK_THEME, Adwaita:dark
env = XDG_CURRENT_DESKTOP, Hyprland
env = XDG_SESSION_TYPE, wayland
env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24

# --- Look and Feel ---
general {
    gaps_in = 6
    gaps_out = 15
    border_size = 2

    # Tokyo Night inspired gradient (Slightly translucent for OLED health)
    col.active_border = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(565f89aa)

    resize_on_border = false
    allow_tearing = false
    layout = dwindle
}

decoration {
    rounding = 12
    # New syntax: rounding_power is now part of the decoration block
    
    active_opacity = 0.98   # Slight transparency to keep pixels shifting
    inactive_opacity = 0.90

    shadow {
        enabled = true
        range = 15
        render_power = 3
        color = rgba(1a1a1aee)
    }

    blur {
        enabled = true
        size = 6
        passes = 3
        vibrancy = 0.1696
        new_optimizations = true
        ignore_opacity = true
        xray = true
    }
}

# --- Animations ---
animations {
    enabled = yes
    bezier = easeOutQuint, 0.23, 1, 0.32, 1
    bezier = quick, 0.15, 0, 0.1, 1

    animation = global, 1, 10, default
    animation = windows, 1, 4.79, easeOutQuint
    animation = windowsIn, 1, 4.1, easeOutQuint, popin 87%
    animation = windowsOut, 1, 1.49, quick, popin 87%
    animation = fadeIn, 1, 1.73, default
    animation = fadeOut, 1, 1.46, default
    animation = layers, 1, 3.81, easeOutQuint
    animation = workspaces, 1, 1.94, default, fade
}

# --- OLED Safety & Efficiency (The "Secret Sauce") ---
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vfr = true                  # Variable Frame Rate: saves energy and pixel wear
}

# --- Keybindings ---
# Basic Binds
bind = $mainMod, t, exec, $terminal
bind = $mainMod, q, killactive,
bind = $mainMod+SHIFT, E, exec, loginctl kill-session $XDG_SESSION_ID
bind = $mainMod+SHIFT, f, exec, $fileManager
bind = $mainMod, V, togglefloating,
bind = $mainMod, d, exec, $menu
bind = $mainMod, P, pseudo,
bind = $mainMod, f, fullscreen,
bind = ALT, F4, exec, : # Disable Alt+F4

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Move window
bind = $mainMod+SHIFT, h, movewindow, l
bind = $mainMod+SHIFT, l, movewindow, r
bind = $mainMod+SHIFT, k, movewindow, u
bind = $mainMod+SHIFT, j, movewindow, d

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
# bind = $mainMod, 6, workspace, 6
# bind = $mainMod, 7, workspace, 7
# bind = $mainMod, 8, workspace, 8
# bind = $mainMod, 9, workspace, 9
# bind = $mainMod, 0, workspace, 10

# Move to Workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# Multimedia Controls (With OLED-friendly notifications)
bindel = ,XF86AudioRaiseVolume, exec, bash -lc 'wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+; V=$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk "{print int(\$2*100)}"); notify-send -a Volume -h string:x-canonical-private-synchronous:volume "🔊 Volume: ${V}%"'
bindel = ,XF86AudioLowerVolume, exec, bash -lc 'wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-; V=$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk "{print int(\$2*100)}"); notify-send -a Volume -h string:x-canonical-private-synchronous:volume "🔉 Volume: ${V}%"'
bindel = ,XF86AudioMute, exec, bash -lc 'wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle; if wpctl get-volume @DEFAULT_AUDIO_SINK@ | grep -q MUTED; then notify-send -a Volume -h string:x-canonical-private-synchronous:volume "🔇 Muted"; else V=$(wpctl get-volume @DEFAULT_AUDIO_SINK@ | awk "{print int(\$2*100)}"); notify-send -a Volume -h string:x-canonical-private-synchronous:volume "🔊 Volume: ${V}%"; fi'

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

# Screenshot
bind = $mainMod+CTRL+SHIFT, p, exec, hyprshot -m region --clipboard-only

# Scripts
#bind = $mainMod+SHIFT+CTRL, M, exec, ~/.config/scripts/monitor-toggler.sh

dwindle {
    pseudotile = true
    preserve_split = true
}

# --- Layer Rules (v0.53 Strict Syntax) ---
layerrule {
    name = waybar_blur_rule  # THE MISSING KEY
    match:namespace = ^(waybar)$
    blur = on
    ignore_alpha = 0.1
    animation = slide top
}

layerrule {
    name = swaync_blur_rule
    match:namespace = ^(swaync)$
    blur = on
    ignore_alpha = 0.1
    animation = fade
}

# --- Window Rules (v0.53 Strict Syntax) ---
windowrule {
    name = global_maximize_fix
    match:class = .*
    suppress_event = maximize
}

windowrule {
    name = xwayland_drag_fix
    match:class = ^$
    match:title = ^$
    match:xwayland = true
    match:float = on            # 'floating' is now 'float'
    no_initial_focus = on       # 'nofocus' is now 'no_initial_focus'
}
